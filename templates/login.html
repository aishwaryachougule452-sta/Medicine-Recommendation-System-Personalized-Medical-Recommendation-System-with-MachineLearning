<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Login - Health Care Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <style>
    body {
      background: url("{{ url_for('static', filename='login_bg.gif') }}") no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: "Poppins", sans-serif;
    }
    .login-box {
      background: rgba(0,0,0,0.85);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .login-box input {
      margin-bottom: 20px;
      border-radius: 6px;
      padding: 12px;
      width: 100%;
      border: none;
      font-size: 16px;
    }
    .btn-login {
      background: #c0392b;
      color: #fff;
      font-weight: 700;
      padding: 12px;
      border-radius: 8px;
      border: none;
      width: 100%;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-login:hover { background:#e74c3c; }
    .error { color: #ff6b6b; margin-bottom: 10px; font-weight: 600; }
    .success { color: #90ee90; margin-bottom: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
      <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="btn-login">Login</button>
    </form>

    <p class="mt-3">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:#f1c40f; font-weight:600;">Create Account</a>
    </p>
  </div>
</body>
</html>
